<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agent · subagents</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>◆ agent</h1>
  <span class="pill" id="cwd"></span>
  <span class="sp"></span>
  <select id="lang-picker" style="width:auto"></select>
  <button onclick="openDoctor()">🩺 <span data-i18n="header.doctor">doctor · all limits</span></button>
  <button class="icon" onclick="openHistory()" data-i18n-title="header.history" title="notification history">🔔<span class="pill" id="hist-badge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--accent);color:#04101f;border:none"></span></button>
  <button class="mini" onclick="refresh()">⟳</button>
</header>
<main>
  <!-- LEFT: project → subagent tree -->
  <div id="left">
    <div class="hd"><span style="flex:1" data-i18n="tree.title">Projects · subagents</span>
      <button class="mini" onclick="openBrowse('add-project')" data-i18n-title="tree.add_project" title="open/add a project folder">📂＋</button></div>
    <div id="tree"></div>
  </div>
  <div class="resizer" id="rez-left"></div>

  <!-- CENTER: chat -->
  <div id="center">
    <div id="chead"><span class="empty" style="margin:0" data-i18n="chat.select_prompt">← select a subagent</span></div>
    <div id="chat"><div class="empty"><span data-i18n="chat.empty_title">No task selected.</span><br><span data-i18n="chat.empty_hint">You can start a new one on the right.</span></div></div>
    <div id="replybar" style="display:none">
      <textarea id="answer" data-i18n-placeholder="chat.answer_placeholder" placeholder="answer the agent / message… (Ctrl+Enter)"></textarea>
      <div class="rcol">
        <label class="chk"><input type="checkbox" id="r-term"> <span data-i18n="chat.terminal">terminal</span></label>
        <button class="primary" id="btn-reply" onclick="sendReply()"><span data-i18n="chat.reply">reply ▸</span></button>
      </div>
    </div>
  </div>
  <div class="resizer" id="rez-right"></div>

  <!-- RIGHT: new task + limits -->
  <div id="right">
    <div class="box">
      <h3 data-i18n="form.title">New task</h3>
      <div class="fld"><label data-i18n="form.project">project (working dir)</label>
        <div class="dirfld"><input id="f-dir"><button class="mini" onclick="openBrowse('pick-field')">📂</button></div>
      </div>
      <div class="fld" style="display:flex;gap:8px">
        <div style="flex:1"><label data-i18n="form.provider">provider</label><select id="f-engine" onchange="syncModels()"></select></div>
        <div style="flex:1"><label data-i18n="form.model">model</label><input id="f-model" list="models" data-i18n-placeholder="form.auto" placeholder="auto"></div>
        <div style="flex:1"><label data-i18n="form.effort">effort</label><select id="f-effort"></select></div>
      </div>
      <datalist id="models"></datalist>
      <div class="fld"><label data-i18n="form.prompt">prompt</label><textarea id="f-prompt" rows="5" data-i18n-placeholder="form.prompt_placeholder" placeholder="do exactly this…"></textarea></div>
      <div class="fld" style="display:flex;flex-direction:column;gap:6px">
        <label class="chk"><input type="checkbox" id="f-prog"> <span data-i18n="form.progress">keep a PROGRESS.md (-p)</span></label>
        <label class="chk"><input type="checkbox" id="f-term"> <span data-i18n="form.terminal">open in a terminal (see the live chat)</span></label>
      </div>
      <button class="primary" id="btn-run" style="width:100%" onclick="submitRun()"><span data-i18n="form.run">▶ run</span></button>
    </div>
    <div class="box">
      <h3 id="lim-title" data-i18n="limits.title">Limits</h3>
      <div id="limits"><span class="empty"><span class="spinner"></span> <span data-i18n="limits.loading">loading…</span></span></div>
    </div>
  </div>
</main>

<!-- doctor modal: all providers + limits -->
<div class="modal" id="m-doc"><div class="card">
  <h2>🩺 <span data-i18n="doctor.title">doctor — engines and limits</span><span class="sp"></span>
    <button class="mini" onclick="refreshDoctor()" data-i18n-title="doctor.refresh" title="refresh">⟳</button>
    <button class="mini" onclick="closeModal('m-doc')">✕</button></h2>
  <pre id="doc" class="mono"><span class="spinner"></span> <span data-i18n="doctor.loading">running doctor…</span></pre>
</div></div>

<!-- toast history modal -->
<div class="modal" id="m-hist"><div class="card" style="width:420px">
  <h2>🔔 <span data-i18n="history.title">notification history</span><span class="sp"></span>
    <button class="mini" onclick="clearHistory()" data-i18n="history.clear">clear</button>
    <button class="mini" onclick="closeModal('m-hist')">✕</button></h2>
  <div id="hist-list" style="overflow:auto"></div>
</div></div>

<!-- folder browser modal -->
<div class="modal" id="m-browse"><div class="card" style="width:520px">
  <h2>📂 <span data-i18n="browse.title">choose a folder</span><span class="sp"></span>
    <button class="mini" onclick="closeModal('m-browse')">✕</button></h2>
  <div class="shortcuts" id="br-shortcuts"></div>
  <div class="crumbs" id="br-crumbs"></div>
  <div class="dirlist" id="br-list"><div class="direntry"><span class="spinner"></span>&nbsp;<span data-i18n="browse.loading">loading…</span></div></div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <input id="br-path" style="flex:1" readonly>
    <button class="primary" onclick="chooseBrowsed()" data-i18n="browse.choose">Choose this folder</button>
  </div>
</div></div>

<div id="toasts"></div>

<!-- classic scripts, one shared global scope, loaded in dependency order (no bundler) -->
<script src="/static/util.js"></script>
<script src="/static/i18n.js"></script>
<script src="/static/toast.js"></script>
<script src="/static/tree.js"></script>
<script src="/static/chat.js"></script>
<script src="/static/modals.js"></script>
<script src="/static/splitters.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
